<!DOCTYPE html>
<html>
<head>
  <title>MTN Subscription Portal</title>

  <!-- Bootstrap CSS -->
  <!-- Bootstrap gives us ready-made design styles -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <!-- Main Card -->
  <div class="card shadow p-4">

    <h3 class="text-center text-warning mb-4">
      MTN Uganda Subscription Portal
    </h3>

    <!-- Subscription Form -->
    <form id="mtnForm">

      <!-- Email Field -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="text" id="email" class="form-control" placeholder="example@gmail.com">
      </div>

      <!-- Phone Field -->
      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="text" id="phone" class="form-control" placeholder="0701234567">
      </div>

      <!-- Password Field -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Strong password">
      </div>

      <!-- Subscribe Button -->
      <button type="submit" class="btn btn-warning w-100">
        Subscribe
      </button>

    </form>

    <!-- MESSAGE AREA (where Access Denied or Allowed appears) -->
    <div id="resultMessage" class="mt-4 text-center"></div>

  </div>

</div>

<!-- Link JavaScript file -->
<script src="groupA.js"></script>

</body>
</html>
